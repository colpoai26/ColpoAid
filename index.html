::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}

@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}

.check-opt{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;transition:.2s;font-family:inherit}
.check-opt.on{border-color:var(--teal);background:var(--tealg);color:var(--teal)}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}

/* AI PANEL */

.ai-finding-row:last-child{border-bottom:none}

/* API KEY SETUP */
.apikey-banner{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(167,139,250,.08));border:1px solid rgba(167,139,250,.25);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px}

@media(max-width:768px){
  /* Sidebar pasa a barra inferior fija (más cómoda en celular) */

  .sidebar>div:first-child{display:none} /* ocultar logo arriba en mobile */

  .main{margin-left:0;margin-bottom:64px;padding:16px 14px}
  /* Grids a una columna */
  .grid4{grid-template-columns:1fr 1fr;gap:10px}

}

<body>
<div class="toast-wrap" id="toasts"></div>
<div id="app"></div>

<script>
// ═══════════════════════════════════════
// SUPABASE - Conexión a la nube
// ═══════════════════════════════════════
const SUPABASE_URL='https://fqepckbcykgpughkenmd.supabase.co';
const SUPABASE_KEY='sb_publishable_Y2RkM7H_WcvxWuo_vy_Ayw_XlOxnPqg';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let cloudUser=null;
function uuid(){return (crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);}));}
// Convierte base64 a Blob de forma compatible con móviles y Safari (procesado en bloques)
function base64ToBlob(dataUrl){
  const parts=dataUrl.split(',');
  const mime=(parts[0].match(/:(.*?);/)||[])[1]||'image/jpeg';
  const byteString=atob(parts[1]);
  const len=byteString.length;
  const ia=new Uint8Array(len);
  // Procesar en bloques de 8KB para no saturar Safari
  const chunk=8192;
  for(let offset=0;offset<len;offset+=chunk){
    const end=Math.min(offset+chunk,len);
    for(let i=offset;i<end;i++)ia[i]=byteString.charCodeAt(i);
  }
  return new Blob([ia],{type:mime});
}
// ═══════════════════════════════════════
// DATABASE
// ═══════════════════════════════════════
const db={
  get:(k,d=[])=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  _key:(base)=>cloudUser?`${base}_${cloudUser.id}`:base,
  patients:()=>db.get(db._key('cai_p'),[]),
  savePatients:v=>{db.set(db._key('cai_p'),v);setTimeout(()=>db.syncPatients(v),100);},
  studies:()=>db.get(db._key('cai_s'),[]),
  saveStudies:v=>{db.set(db._key('cai_s'),v);setTimeout(()=>db.syncStudies(v),100);},
  doctor:()=>db.get('cai_d',null),
  saveDoctor:v=>db.set('cai_d',v),
  clearDoctor:()=>localStorage.removeItem('cai_d'),
  studiesOf:id=>db.studies().filter(s=>s.patientId===id),
  getApiKey:()=>localStorage.getItem('cai_apikey')||'',
  saveApiKey:v=>localStorage.setItem('cai_apikey',v),
  // ── Sincronización con la nube (Supabase) ──
  syncPatients:async(list)=>{
    if(!cloudUser)return;
    try{
      for(const p of list){
        await sb.from('pacientes').upsert({
          id:p.id.length>20?p.id:undefined,
          user_id:cloudUser.id,nombre:p.nombre,codigo:p.codigo,
          edad:p.edad?parseInt(p.edad):null,fecha:p.fecha||null,
          pap:p.pap,hpv:p.hpv,motivo:p.motivo,antecedentes:p.antecedentes
        },{onConflict:'id'}).select();
      }
    }catch(e){console.log('Sync pacientes:',e.message);}
  },
  syncStudies:async(list)=>{
    if(!cloudUser)return;
    try{
      for(const s of list){
        await sb.from('estudios').upsert({
          id:s.id.length>20?s.id:undefined,
          user_id:cloudUser.id,
          paciente_id:(s.patientId&&s.patientId.length>20)?s.patientId:null,
          fecha:s.date||null,motivo:s.motivo,
          hallazgos:s.findings,clock_marks:s.clockMarks,
          diagnostico:s.diagnostico,conducta:s.conducta,notas:s.notas,
          correlacion:s.correlacion,ai_analyzed:s.aiAnalyzed||false,
          ai_summary:s.aiSummary,ai_confianza:s.aiConfianza,ai_zonas:s.aiZonas,
          image_paths:s.imagePaths||[]
        },{onConflict:'id'}).select();
      }
    }catch(e){console.log('Sync estudios:',e.message);}
  },
  deletePatientCloud:async(id)=>{
    if(!cloudUser||id.length<20)return;
    try{await sb.from('pacientes').delete().eq('id',id);}catch(e){console.log('Del paciente:',e.message);}
  },
  deleteStudyCloud:async(id)=>{
    if(!cloudUser||id.length<20)return;
    try{await sb.from('estudios').delete().eq('id',id);}catch(e){console.log('Del estudio:',e.message);}
  },
  // Cargar datos desde la nube y fusionar con lo local
  loadFromCloud:async()=>{    if(!cloudUser)return;
    try{
      const {data:pacientes}=await sb.from('pacientes').select('*').eq('user_id',cloudUser.id);
      const {data:estudios}=await sb.from('estudios').select('*').eq('user_id',cloudUser.id);
      if(pacientes){
        const mapped=pacientes.map(p=>({
          id:p.id,nombre:p.nombre,codigo:p.codigo||'',edad:p.edad||'',
          fecha:p.fecha||'',pap:p.pap||'',hpv:p.hpv||'',motivo:p.motivo||'',
          antecedentes:p.antecedentes||'',createdAt:p.created_at
        }));
        db.set(db._key('cai_p'),mapped);
      }
      if(estudios){
        const mapped=[];
        for(const s of estudios){
          const study={
            id:s.id,patientId:s.paciente_id,date:s.fecha||'',motivo:s.motivo||'',
            findings:s.hallazgos||{},clockMarks:s.clock_marks||[],
            diagnostico:s.diagnostico||'',conducta:s.conducta||'',notas:s.notas||'',
            correlacion:s.correlacion||'',aiAnalyzed:s.ai_analyzed||false,
            aiSummary:s.ai_summary||'',aiConfianza:s.ai_confianza||'',aiZonas:s.ai_zonas||[],
            images:[],annotations:[],biopsias:[],imagePaths:s.image_paths||[],createdAt:s.created_at
          };
          // Generar URLs firmadas para las imágenes del bucket
          if(s.image_paths&&s.image_paths.length){
            for(const path of s.image_paths){
              if(path.startsWith('http')){study.images.push(path);continue;}
              try{
                const {data:signed}=await sb.storage.from('imagenes').createSignedUrl(path,3600);
                if(signed?.signedUrl)study.images.push(signed.signedUrl);
              }catch(e){console.log('Signed url:',e.message);}
            }
          }
          mapped.push(study);
        }
        // Conservar biopsias locales si existen
        const local=db.studies();
        mapped.forEach(m=>{
          const loc=local.find(l=>l.id===m.id);
          if(loc){m.biopsias=loc.biopsias||loc.biopsias||[];if(!m.images.length&&loc.images)m.images=loc.images;}
        });
        db.set(db._key('cai_s'),mapped);
      }
    }catch(e){console.log('Load from cloud:',e.message);}
  },
};

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function toast(msg,type='ok'){
  const el=document.createElement('div');
  const icons={ok:'✓',err:'✕',info:'ℹ',ai:'🤖'};
  el.className=`toast t-${type}`;
  el.innerHTML=`<span>${icons[type]||'ℹ'}</span>${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
const papColor=p=>(!p||p==='Normal')?'ok':['ASCUS','LSIL'].includes(p)?'warn':'danger';
const diagColor=d=>{
  if(!d||d==='Normal')return'ok';
  if(d.includes('G1')||d.includes('menor'))return'blue';
  if(d.includes('G2')||d.includes('mayor'))return'warn';
  if(d.includes('carcinoma')||d.includes('Sospecha'))return'danger';
  return'gray';
};

let currentDoctor=null,currentPage='dashboard',selectedPatient=null;

// ═══════════════════════════════════════════════════════════════
// ███  MOTOR IA ColpoAId — MÓDULO AISLADO  ███
// ═══════════════════════════════════════════════════════════════
// Toda la lógica de IA vive acá dentro, separada del resto de la app.
// Para cambiar de motor (modelo propio, otro proveedor) en el futuro,
// solo se modifica este módulo. El resto de la app NO se toca.
//
// Puerta de entrada única:  MotorIA.analizar(imagen, contexto)
//   → devuelve un objeto con los hallazgos descriptivos
//
// Partes del módulo:
//   1. config       → ajustes del motor (endpoint, versión)
//   2. construirPrompt → arma las instrucciones para la IA
//   3. llamar       → se comunica con el motor (hoy: proxy serverless)
//   4. procesar     → interpreta y limpia la respuesta
//   5. analizar     → orquesta todo (la función pública)
// ═══════════════════════════════════════════════════════════════
const MotorIA = {

  // ── 1. Configuración del motor ──────────────────────────────
  config:{
    endpoint:'/api/analyze',   // proxy seguro en Vercel (la API key vive ahí)
    version:'colpoaid-descriptivo-v1',
  },

  // ── 2. Construcción del prompt (instrucciones para la IA) ────
  construirPrompt(patientContext=''){
    return `Sos un asistente de DOCUMENTACIÓN colposcópica. Tu rol es DESCRIBIR objetivamente lo que se observa en la imagen, como lo dictaría un médico al registrar sus hallazgos. NO emitís diagnósticos ni grados de lesión. La interpretación diagnóstica corresponde EXCLUSIVAMENTE al médico.

Contexto de la paciente: ${patientContext||'Sin datos adicionales'}

Analizá la imagen y respondé ÚNICAMENTE con un objeto JSON válido con esta estructura exacta (sin texto antes ni después):

{
  "union": "Visible|Parcialmente visible|No visible",
  "acetoblanco": "Ausente|Leve|Intenso|Denso",
  "mosaico": "Ausente|Fino|Grueso",
  "punteado": true|false,
  "vasos": true|false,
  "yodo": "Yodo positivo|Yodo negativo parcial|Yodo negativo|",
  "cervicitis": true|false,
  "leucoplasia": true|false,
  "descripcion": "Descripción objetiva y detallada de lo que se observa, en lenguaje clínico descriptivo (NO diagnóstico). Ej: 'Se observa epitelio acetoblanco de bordes definidos en cuadrante superior, con patrón de mosaico grueso. Unión escamocolumnar visible.' Describí ubicación, características y extensión de lo observado.",
  "sugerencia": "Sugerencia prudente sobre áreas que el médico podría considerar evaluar, SIN indicar conducta médica específica. Ej: 'Se sugiere considerar la evaluación del área acetoblanca descrita según criterio del profesional.' Si no hay hallazgos relevantes: 'Sin áreas que requieran señalamiento particular.'",
  "clockMarks": [lista de horas 1-12 donde se observan hallazgos, ej: [3,6,9]],
  "confianza": "Alta|Media|Baja",
  "advertencia": "Recordatorio de que es una descripción asistida y la valoración corresponde al médico",
  "zonas": [
    {
      "tipo": "nombre descriptivo del hallazgo observado (ej: Acetoblanco, Mosaico grueso, Mosaico fino, Vasos, Punteado, Leucoplasia)",
      "atencion": "alto|medio|leve (nivel de atención sugerido según cuán llamativo/prominente es el hallazgo — NO es un diagnóstico, solo prominencia visual)",
      "forma": "circulo|rectangulo|poligono",
      "x": porcentaje horizontal del centro (0-100),
      "y": porcentaje vertical del centro (0-100),
      "radio": porcentaje del tamaño de la zona (5-35),
      "descripcion": "descripción breve y objetiva de lo observado en la zona"
    }
  ]
}

NIVEL DE ATENCIÓN (campo "atencion") — NO es diagnóstico, es prominencia visual:
- "alto": hallazgo muy prominente/llamativo que conviene destacar para evaluación
- "medio": hallazgo presente que vale la pena considerar
- "leve": hallazgo sutil o tenue
- Es solo una guía visual de cuánto resalta el área, NO una clasificación de gravedad ni grado.

REGLAS FUNDAMENTALES (lenguaje DESCRIPTIVO, no diagnóstico):
- DESCRIBÍ lo que se ve, NO interpretes ni clasifiques en grados.
- PROHIBIDO usar términos diagnósticos como: "alto grado", "bajo grado", "CIN I/II/III", "NIC", "lesión de alto/bajo grado", "displasia", "carcinoma", "G1/G2", "sospecha de malignidad".
- En lugar de diagnosticar, DESCRIBÍ las características visuales (color, bordes, patrón vascular, extensión, ubicación).
- Podés SUGERIR con prudencia áreas a considerar evaluar, pero NUNCA indicar conducta médica (no decir "hacer biopsia", "derivar", "tratar").
- Usá lenguaje como "se observa", "se aprecia", "se identifica", "área a considerar según criterio del profesional".

INSTRUCCIONES PARA LAS ZONAS (ubicación precisa):
- Marcá las áreas con hallazgos visibles, usando coordenadas en PORCENTAJE (0-100).
- IMPORTANTE sobre coordenadas: x=0 es el borde IZQUIERDO, x=100 el DERECHO. y=0 es ARRIBA, y=100 ABAJO.
- Mirá CON ATENCIÓN dónde está cada hallazgo en la imagen antes de asignar coordenadas.
- El cuello uterino suele ocupar la zona central de la imagen. Las zonas oscuras
  de los bordes (esquinas negras del espéculo/lente) NO son hallazgos — NO las marques.
- Ubicá cada marca EXACTAMENTE sobre el hallazgo que describís, no en zonas vecinas.
- Verificá: si describís algo "en el centro", x e y deben rondar 45-55.
- Marcá SOLO zonas donde realmente observes hallazgos sobre tejido cervical.
- Si no hay hallazgos, zonas=[]. Máximo 6 zonas.
- Si la imagen no es colposcópica o tiene mala calidad, zonas=[].

IMPORTANTE: Esta es una herramienta de DOCUMENTACIÓN y APOYO descriptivo. No reemplaza la valoración clínica. Toda interpretación diagnóstica y decisión corresponde exclusivamente al médico tratante.`;
  },

  // ── 3. Llamada al motor (hoy: proxy serverless en Vercel) ────
  // El día de mañana, para usar un modelo propio, solo se cambia esta función.
  async llamar(base64Image,prompt){
    const response=await fetch(this.config.endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:base64Image,prompt})
    });
    if(!response.ok){
      const err=await response.json().catch(()=>({}));
      throw new Error(err?.error||`Error ${response.status}`);
    }
    const data=await response.json();
    return data.text||'';
  },

  // ── 4. Procesamiento de la respuesta (limpieza + parseo) ─────
  procesar(text){
    let clean=text.replace(/```json|```/g,'').trim();
    try{
      return JSON.parse(clean);
    }catch(e){
      // Recuperación si el JSON viene incompleto
      const first=clean.indexOf('{');
      const last=clean.lastIndexOf('}');
      if(first>=0&&last>first){
        try{return JSON.parse(clean.slice(first,last+1));}catch(e2){}
      }
      throw new Error('La respuesta de la IA llegó incompleta. Probá analizar de nuevo.');
    }
  },

  // ── 5. PUERTA DE ENTRADA PÚBLICA ────────────────────────────
  // Esto es lo único que el resto de la app necesita llamar.
  async analizar(base64Image,patientContext=''){
    const prompt=this.construirPrompt(patientContext);
    const respuestaCruda=await this.llamar(base64Image,prompt);
    return this.procesar(respuestaCruda);
  },
};

// Puente de compatibilidad: el resto de la app sigue llamando a esta función,
// pero internamente usa el módulo aislado. Así no hay que cambiar nada más.
async function analyzeImageWithAI(base64Image,patientContext=''){
  return MotorIA.analizar(base64Image,patientContext);

function bindLogin(){
  document.getElementById('btn-login').onclick=async()=>{
    const email=document.getElementById('l-email').value.trim();
    const pass=document.getElementById('l-pass').value;
    const err=document.getElementById('login-err');
    err.style.display='none';
    if(!email||!pass){err.style.display='block';err.textContent='Completá todos los campos.';return;}
    if(pass.length<6){err.style.display='block';err.textContent='La contraseña debe tener al menos 6 caracteres.';return;}
    const btn=document.getElementById('btn-login');
    btn.innerHTML='<span class="spinner"></span> Procesando...';btn.disabled=true;
    try{
      if(authMode==='register'){
        const name=document.getElementById('l-name').value.trim()||email.split('@')[0];
        const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
        if(error)throw error;
        if(data.user&&!data.session){
          err.style.display='block';err.style.color='var(--ok)';err.style.background='rgba(34,201,122,.1)';err.style.borderColor='rgba(34,201,122,.2)';
          err.textContent='✓ Cuenta creada. Revisá tu email para confirmar y luego iniciá sesión.';
          btn.innerHTML='Crear cuenta';btn.disabled=false;
          return;
        }
        cloudUser=data.user;
        currentDoctor={name,email};db.saveDoctor(currentDoctor);
        await db.loadFromCloud();subscribeRealtime();render();
      }else{
        const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
        if(error)throw error;
        cloudUser=data.user;
        const name=data.user.user_metadata?.name||email.split('@')[0];
        currentDoctor={name,email};db.saveDoctor(currentDoctor);
        await db.loadFromCloud();subscribeRealtime();render();
      }
    }catch(e){
      err.style.display='block';
      let msg=e.message||'Error';
      if(msg.includes('Invalid login'))msg='Email o contraseña incorrectos.';
      if(msg.includes('already registered'))msg='Este email ya está registrado. Iniciá sesión.';
      if(msg.includes('Email not confirmed'))msg='Confirmá tu email antes de ingresar.';
      err.textContent=msg;
      btn.innerHTML=authMode==='register'?'Crear cuenta':'Ingresar';btn.disabled=false;
    }
  };
  document.getElementById('l-pass').onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-login').click()};
}

let firmaDrawing=false,firmaHasContent=false,firmaCtx=null;
function bindSettings(){
  const canvas=document.getElementById('firma-canvas');
  if(!canvas)return;
  firmaCtx=canvas.getContext('2d');
  firmaCtx.strokeStyle='#1a2340';firmaCtx.lineWidth=2.2;firmaCtx.lineCap='round';firmaCtx.lineJoin='round';
  firmaHasContent=false;
  const preview=document.getElementById('firma-preview');
  const pos=e=>{
    const r=canvas.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    return {x:cx*(canvas.width/r.width),y:cy*(canvas.height/r.height)};
  };
  const start=e=>{e.preventDefault();if(preview)preview.style.display='none';firmaDrawing=true;const p=pos(e);firmaCtx.beginPath();firmaCtx.moveTo(p.x,p.y);};
  const move=e=>{if(!firmaDrawing)return;e.preventDefault();const p=pos(e);firmaCtx.lineTo(p.x,p.y);firmaCtx.stroke();firmaHasContent=true;};
  const end=()=>{firmaDrawing=false;};
  canvas.onmousedown=start;canvas.onmousemove=move;canvas.onmouseup=end;canvas.onmouseleave=end;
  canvas.ontouchstart=start;canvas.ontouchmove=move;canvas.ontouchend=end;
}
function clearFirma(){
  const canvas=document.getElementById('firma-canvas');
  if(canvas&&firmaCtx)firmaCtx.clearRect(0,0,canvas.width,canvas.height);
  const preview=document.getElementById('firma-preview');if(preview)preview.style.display='none';
  firmaHasContent=false;
  const prof=db.doctor()||{};prof.firma='';db.saveDoctor(prof);
}

  const selG=document.querySelector('#genero-group .radio-opt.on');
  if(selG)prof.genero=selG.dataset.g;
  // Guardar firma si se dibujó algo nuevo
  if(firmaHasContent){
    const canvas=document.getElementById('firma-canvas');
    if(canvas)prof.firma=canvas.toDataURL('image/png');
  }
  db.saveDoctor(prof);
  currentDoctor=prof;
  render();
  toast('Perfil guardado. Aparecerá en tus informes.','ok');
}
// Saludo y especialidad según género del perfil
function saludo(){
  const g=currentDoctor?.genero;
  if(g==='F')return 'Bienvenida';
  if(g==='M')return 'Bienvenido';
  return 'Bienvenido/a';
}
function tratamiento(){
  const g=currentDoctor?.genero;
  const esp=currentDoctor?.especialidad;
  if(esp)return esp; // si puso especialidad, la usamos tal cual
  if(g==='F')return 'Ginecóloga';
  if(g==='M')return 'Ginecólogo';
  return 'Profesional';
}
function saveApiKey(){
  const key=document.getElementById('api-key-input')?.value?.trim();
  if(!key){toast('Ingresá una API key válida.','err');return;}
  if(!key.startsWith('sk-ant')){toast('La key debe empezar con sk-ant...','err');return;}
  db.saveApiKey(key);render();toast('API key guardada. ¡Ya podés usar la IA!','ok');
}
function clearApiKey(){
  if(!confirm('¿Eliminar la API key?'))return;
  localStorage.removeItem('cai_apikey');render();toast('API key eliminada.','info');
}

function filterPatients(){

function deletePatient(id){
  if(!confirm('¿Eliminar paciente y sus estudios?'))return;
  const studiesToDelete=db.studies().filter(s=>s.patientId===id);
  db.savePatients(db.patients().filter(p=>p.id!==id));
  db.saveStudies(db.studies().filter(s=>s.patientId!==id));
  db.deletePatientCloud(id);
  studiesToDelete.forEach(s=>db.deleteStudyCloud(s.id));
  navigate('patients');toast('Paciente eliminada.','info');
}

function savePatient(editId){
  const nombre=document.getElementById('pm-nombre').value.trim();
  if(!nombre){toast('El nombre es requerido.','err');return;}
  const selG=document.querySelector('#pm-genero-group .radio-opt.on');
  const p={id:editId||uuid(),createdAt:editId?(db.patients().find(x=>x.id===editId)?.createdAt||new Date().toISOString()):new Date().toISOString(),
    nombre,codigo:document.getElementById('pm-codigo').value,edad:document.getElementById('pm-edad').value,
    fecha:document.getElementById('pm-fecha').value,pap:document.getElementById('pm-pap').value,
    hpv:document.getElementById('pm-hpv').value,motivo:document.getElementById('pm-motivo').value,
    genero:selG?selG.dataset.g:'',
    antecedentes:document.getElementById('pm-ant').value};
  const all=db.patients();
  if(editId)db.savePatients(all.map(x=>x.id===editId?p:x));else db.savePatients([...all,p]);
  closePatientModal();navigate('patients');
  toast(editId?'Paciente actualizada.':'Paciente registrada.','ok');
}

let studyFormData={},studyStep=0;

function openStudyModal(id=null){
  const edit=id?db.studies().find(s=>s.id===id):null;
  studyStep=0;
  studyFormData=edit?JSON.parse(JSON.stringify(edit)):{
    patientId:selectedPatient.id,date:new Date().toISOString().slice(0,10),
    images:[],annotations:[],clockMarks:[],biopsias:[],correlacion:'',
    aiAnalyzed:false,aiSummary:'',aiDescripcion:'',aiSugerencia:'',
    findings:{union:'',acetoblanco:'',mosaico:'',punteado:false,vasos:false,yodo:'',cervicitis:false,leucoplasia:false},
    diagnostico:'',conducta:'',notas:'',
  };
  renderStudyModal(edit?.id||null);
}

function renderStudyModal(editId){
  document.getElementById('study-modal').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeStudyModal()">
  <div class="modal modal-wide" style="max-height:95vh">
    <div style="padding:22px 24px 0;display:flex;align-items:flex-start;justify-content:space-between">
      <div><div style="font-family:Lora,serif;font-size:19px">${editId?'Editar estudio':'Nuevo estudio'}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">Paciente: ${selectedPatient.nombre}</div></div>
      <button onclick="closeStudyModal()" style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px">✕</button>
    </div>
    <div style="padding:16px 24px 0;display:flex;align-items:center;gap:0;flex-wrap:wrap" id="study-step-indicator">
      ${renderStepIndicator()}
    </div>
    <div style="padding:18px 24px 24px" id="study-step-content">
      ${renderStudyStep(editId)}

  bindStudyStep();
}

function renderStepIndicator(){
  return ['Datos','Imágenes + IA','Hallazgos','Diagnóstico','Biopsias'].map((s,i)=>`
    <div style="display:flex;align-items:center">
      <div style="display:flex;align-items:center;gap:7px;cursor:pointer" onclick="goStudyStep(${i})">
        <div class="step-num" style="border-color:${i<studyStep?'var(--ok)':i===studyStep?'var(--blue)':'var(--border2)'};background:${i<studyStep?'var(--ok)':i===studyStep?'var(--blue)':'transparent'};color:${i<=studyStep?'#fff':'var(--text3)'}">
          ${i<studyStep?'✓':i+1}
        </div>
        <span style="font-size:12px;font-weight:500;color:${i===studyStep?'var(--blue)':'var(--text3)'}">${s}</span>
      </div>
      ${i<4?`<div style="width:20px;height:1px;background:var(--border2);margin:0 6px"></div>`:''}
    </div>`).join('');
}

      </div>

      <div style="display:flex;flex-wrap:wrap;gap:7px">

      <div style="display:flex;flex-wrap:wrap;gap:7px">
        ${radios('conducta',['Control anual','Control semestral','Biopsia dirigida','Tratamiento escisional','Derivación oncología'],studyFormData.conducta)}

function renderBiopsiaRow(b,i){
  const AP_OPTIONS=['Negativo / Normal','CIN I (NIC I)','CIN II (NIC II)','CIN III (NIC III)','Carcinoma in situ','Carcinoma invasor','Adenocarcinoma','Cambios por HPV','Cervicitis crónica','Metaplasia escamosa','Endocérvix normal','Otro'];
  const ZONA_OPTIONS=['Ectocérvix','Endocérvix','Unión escamocolumnar','Legrado endocervical'];
  return`<div style="background:var(--bg3);border-radius:10px;padding:14px;border:1px solid var(--border)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-weight:600;font-size:13px;color:var(--teal)">🔬 Biopsia ${i+1}</div>
      <button onclick="removeBiopsia(${i})" style="background:rgba(232,85,85,.1);border:1px solid rgba(232,85,85,.2);color:var(--danger);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px">✕ Eliminar</button>
    </div>
    <div class="grid3" style="gap:10px;margin-bottom:10px">
      <div><label class="lbl">Hora del reloj</label>
        <select onchange="updateBiopsia(${i},'hora',this.value)" style="width:100%">
          <option value="">— Sin ubicación —</option>
          ${Array.from({length:12},(_,j)=>`<option value="${j+1}"${b.hora==j+1?' selected':''}>${j+1}hs</option>`).join('')}
        </select>
      </div>
      <div><label class="lbl">Zona anatómica</label>
        <select onchange="updateBiopsia(${i},'zona',this.value)" style="width:100%">
          <option value="">— Seleccionar —</option>
          ${['Ectocérvix','Endocérvix','Unión escamocolumnar','Legrado endocervical'].map(o=>`<option${b.zona===o?' selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div><label class="lbl">Fecha de biopsia</label>
        <input type="date" value="${b.fechaBiopsia||''}" onchange="updateBiopsia(${i},'fechaBiopsia',this.value)"/>
      </div>
    </div>
    <div class="grid2" style="gap:10px">
      <div><label class="lbl">Resultado anatomopatológico</label>
        <select onchange="updateBiopsia(${i},'resultado',this.value)" style="width:100%">
          <option value="">— Pendiente de resultado —</option>
          ${['Negativo / Normal','CIN I (NIC I)','CIN II (NIC II)','CIN III (NIC III)','Carcinoma in situ','Carcinoma invasor','Adenocarcinoma','Cambios por HPV','Cervicitis crónica','Metaplasia escamosa','Endocérvix normal','Otro'].map(o=>`<option${b.resultado===o?' selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div><label class="lbl">Fecha del resultado AP</label>
        <input type="date" value="${b.fechaResultado||''}" onchange="updateBiopsia(${i},'fechaResultado',this.value)"/>
      </div>
    </div>
    <div style="margin-top:10px"><label class="lbl">Observaciones</label>
      <input type="text" value="${b.obs||''}" placeholder="Notas adicionales sobre esta biopsia..." onchange="updateBiopsia(${i},'obs',this.value)"/>
    </div>
  </div>`;
}

function addBiopsia(){
  if(!studyFormData.biopsias)studyFormData.biopsias=[];
  studyFormData.biopsias.push({hora:'',zona:'',fechaBiopsia:'',resultado:'',fechaResultado:'',obs:''});
  document.getElementById('study-step-content').innerHTML=renderStudyStep(null);
  bindStudyStep();
}

function removeBiopsia(i){
  studyFormData.biopsias.splice(i,1);
  document.getElementById('study-step-content').innerHTML=renderStudyStep(null);
  bindStudyStep();
}

function updateBiopsia(i,key,val){
  if(!studyFormData.biopsias)studyFormData.biopsias=[];
  studyFormData.biopsias[i][key]=val;
}

// Draw AI-detected zones on the canvas
// Color según nivel de atención (NO diagnóstico — solo prominencia visual)
function atencionColor(nivel){
  const n=(nivel||'medio').toLowerCase();
  if(n==='alto')return '#e85555';   // rojo
  if(n==='medio')return '#f5a623';  // naranja
  if(n==='leve')return '#f5d76e';   // amarillo
  return '#f5a623';
}
function drawAiZones(zonas){
  const canvas=document.getElementById('annot-canvas');
  const img=document.getElementById('annot-img');
  if(!canvas||!img||!zonas||!zonas.length)return;

  const W=canvas.width,H=canvas.height;
  const ctx=canvas.getContext('2d');

  // Keep existing manual paths + add AI zones
  redrawCanvas(); // redraw manual annotations first

  zonas.forEach((zona,idx)=>{
    const cx=(zona.x/100)*W;
    const cy=(zona.y/100)*H;
    const r=((zona.radio||15)/100)*Math.min(W,H);
    const color=atencionColor(zona.atencion);

    ctx.save();

    // Outer glow
    const grd=ctx.createRadialGradient(cx,cy,r*0.3,cx,cy,r);
    grd.addColorStop(0,color+'55');
    grd.addColorStop(1,color+'00');
    ctx.fillStyle=grd;
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fill();

    // Border circle
    ctx.strokeStyle=color;
    ctx.lineWidth=2.5;
    ctx.setLineDash([6,3]);
    ctx.shadowColor=color;
    ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur=0;

    // Número de referencia (imagen limpia, sin texto descriptivo encima)
    const num=String(idx+1);
    ctx.font='bold 13px DM Sans, sans-serif';
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(cx,cy,11,0,Math.PI*2);
    ctx.fillStyle='rgba(13,16,24,0.9)';
    ctx.fill();
    ctx.strokeStyle=color;
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.fillStyle=color;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(num,cx,cy+0.5);
    ctx.textAlign='left';
    ctx.textBaseline='alphabetic';

    ctx.restore();
  });

  // Save these as AI annotations
  studyFormData.aiZonasPainted=true;
}

function redrawAiZones(){
  const zonas=studyFormData.aiZonas||[];
  if(!zonas.length){toast('No hay zonas IA para redibujar.','info');return;}
  drawAiZones(zonas);
  toast('Zonas redibujadas en la imagen.','ai');
}

function handleImgFiles(files){
  // En celulares y Safari achicamos más para evitar que el navegador se cuelgue
  const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&/Macintosh/i.test(navigator.userAgent));
  const small=isMobile||isSafari;
  const maxSize=small?850:1024;
  const quality=small?0.72:0.82;
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/'))return;
    resizeImage(file,maxSize,quality,(resizedDataUrl)=>{
      studyFormData.images.push(resizedDataUrl);
      document.getElementById('img-thumbs').innerHTML=renderThumbs();
      document.getElementById('ai-analysis-section').innerHTML=studyFormData.aiAnalyzed?renderAiResults():renderAiButton();
      document.getElementById('annotator-area').innerHTML=renderAnnotator();
      bindAnnotator();
    });
  });
}

// Redimensiona y comprime la imagen antes de guardarla
// maxSize = ancho/alto máximo en px · quality = 0-1 (compresión JPEG)
function resizeImage(file,maxSize,quality,callback){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let{width,height}=img;
      // Calcular nuevas dimensiones manteniendo proporción
      if(width>height){
        if(width>maxSize){height=Math.round(height*maxSize/width);width=maxSize;}
      }else{
        if(height>maxSize){width=Math.round(width*maxSize/height);height=maxSize;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=width;canvas.height=height;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,width,height);
      // Exportar como JPEG comprimido
      const resized=canvas.toDataURL('image/jpeg',quality);
      callback(resized);
    };
    img.onerror=()=>callback(e.target.result); // si falla, usar original
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── CANVAS ──────────────────────────────────────
let drawing=false,drawColor='#00d4b8',drawSize=4,drawPaths=[],currentPath=[];
function renderAnnotator(){
  if(!studyFormData.images[0])return'';
  return`<div style="margin-top:16px">
    <div style="font-weight:600;font-size:13px;margin-bottom:10px">Marcar zonas manualmente</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      ${['#00d4b8','#e85555','#f5a623','#4f8ef7','#22c97a','#ffffff'].map(c=>`<button onclick="drawColor='${c}'" style="width:22px;height:22px;border-radius:50%;background:${c};border:none;cursor:pointer"></button>`).join('')}
      <span style="font-size:11px;color:var(--text3)">Grosor:</span>
      <input type="range" min="2" max="16" value="4" oninput="drawSize=+this.value" style="width:70px;accent-color:var(--teal)"/>
      <button class="btn btn-d btn-sm" onclick="clearCanvas()">🗑 Limpiar</button>
    </div>
    <div class="canvas-wrap" id="canvas-wrap">
      <img id="annot-img" src="${studyFormData.images[0]}" style="width:100%;display:block;border-radius:10px;border:1px solid var(--border2)" draggable="false"/>
      <canvas id="annot-canvas" style="position:absolute;top:0;left:0;border-radius:10px;opacity:.85;pointer-events:none"></canvas>
      <canvas id="annot-overlay" style="position:absolute;top:0;left:0;border-radius:10px;cursor:crosshair"></canvas>
    </div>
  </div>`;
}
function bindAnnotator(){
  const img=document.getElementById('annot-img');if(!img)return;
  img.onload=setupCanvases;if(img.complete)setupCanvases();
  const ov=document.getElementById('annot-overlay');if(!ov)return;
  ov.onmousedown=startDraw;ov.onmousemove=doDraw;ov.onmouseup=endDraw;ov.onmouseleave=endDraw;
  ov.ontouchstart=e=>{e.preventDefault();startDraw(e.touches[0])};
  ov.ontouchmove=e=>{e.preventDefault();doDraw(e.touches[0])};
  ov.ontouchend=endDraw;
}
function setupCanvases(){
  const img=document.getElementById('annot-img'),c=document.getElementById('annot-canvas'),ov=document.getElementById('annot-overlay');
  if(!img||!c||!ov)return;
  c.width=ov.width=img.clientWidth;c.height=ov.height=img.clientHeight;
  drawPaths=studyFormData.annotations[0]||[];redrawCanvas();
}
function getPos(e,el){const r=el.getBoundingClientRect();return{x:(e.clientX||e.pageX)-r.left,y:(e.clientY||e.pageY)-r.top};}
function startDraw(e){drawing=true;currentPath=[getPos(e,document.getElementById('annot-overlay'))];}
function doDraw(e){
  if(!drawing)return;const ov=document.getElementById('annot-overlay');if(!ov)return;
  currentPath.push(getPos(e,ov));
  const ctx=ov.getContext('2d');ctx.clearRect(0,0,ov.width,ov.height);
  ctx.beginPath();ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.moveTo(currentPath[0].x,currentPath[0].y);currentPath.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();
}
function endDraw(){
  if(!drawing||currentPath.length<2){drawing=false;currentPath=[];return;}
  drawPaths.push({points:currentPath,color:drawColor,size:drawSize});currentPath=[];drawing=false;
  const ov=document.getElementById('annot-overlay');if(ov){ov.getContext('2d').clearRect(0,0,ov.width,ov.height);}
  redrawCanvas();studyFormData.annotations[0]=drawPaths;
}
function redrawCanvas(){
  const c=document.getElementById('annot-canvas');if(!c)return;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
  drawPaths.forEach(({points,color,size})=>{
    if(points.length<2)return;
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.moveTo(points[0].x,points[0].y);points.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();
  });
}
function clearCanvas(){drawPaths=[];studyFormData.annotations[0]=[];redrawCanvas();}

// ── CLOCK ──────────────────────────────────────
function renderClock(marks=[]){
  const CX=100,CY=100,RO=88,RI=44,RD=70;
  const sectors=Array.from({length:12},(_,i)=>{
    const h=i+1,ang=(i*30-90)*Math.PI/180;
    const a1=((i*30-90)-15)*Math.PI/180,a2=((i*30-90)+15)*Math.PI/180;
    const x1o=CX+RO*Math.cos(a1),y1o=CY+RO*Math.sin(a1),x2o=CX+RO*Math.cos(a2),y2o=CY+RO*Math.sin(a2);
    const x1i=CX+RI*Math.cos(a1),y1i=CY+RI*Math.sin(a1),x2i=CX+RI*Math.cos(a2),y2i=CY+RI*Math.sin(a2);
    const path=`M ${x1i} ${y1i} L ${x1o} ${y1o} A ${RO} ${RO} 0 0 1 ${x2o} ${y2o} L ${x2i} ${y2i} A ${RI} ${RI} 0 0 0 ${x1i} ${y1i} Z`;
    const dx=CX+RD*Math.cos(ang),dy=CY+RD*Math.sin(ang);
    const lx=CX+97*Math.cos(ang),ly=CY+97*Math.sin(ang);
    const on=marks.includes(h);
    return`<g style="cursor:pointer" onclick="toggleClock(${h})">
      <path d="${path}" fill="${on?'rgba(0,212,184,0.28)':'rgba(255,255,255,0.03)'}" stroke="${on?'var(--teal)':'var(--border)'}" stroke-width="0.8" style="transition:fill .2s"/>
      <circle cx="${dx}" cy="${dy}" r="${on?7:5}" fill="${on?'var(--teal)':'var(--surface2)'}" stroke="${on?'rgba(0,212,184,.5)':'var(--border2)'}" stroke-width="${on?2:1}" style="transition:all .2s"/>
      ${on?`<text x="${dx}" y="${dy+4}" text-anchor="middle" font-size="7" fill="#061a17" font-weight="bold">✓</text>`:''}
      <text x="${lx}" y="${ly+4}" text-anchor="middle" font-size="9" fill="${on?'var(--teal)':'var(--text3)'}" font-weight="${on?700:400}" style="user-select:none">${h}</text>
    </g>`;
  });
  return`<svg width="214" height="214" viewBox="-7 -7 214 214">
    <circle cx="${CX}" cy="${CY}" r="${RO+2}" fill="var(--bg3)" stroke="var(--border2)" stroke-width="1"/>
    ${sectors.join('')}
    <circle cx="${CX}" cy="${CY}" r="${RI}" fill="var(--bg2)" stroke="var(--border2)" stroke-width="1"/>
    <text x="${CX}" y="${CY-5}" text-anchor="middle" font-size="7" fill="var(--text3)">CÉRVIX</text>
    <text x="${CX}" y="${CY+6}" text-anchor="middle" font-size="7" fill="var(--text3)">360°</text>
  </svg>`;
}
function toggleClock(h){
  const marks=studyFormData.clockMarks,idx=marks.indexOf(h);
  if(idx>=0)marks.splice(idx,1);else marks.push(h);
  captureStepData();document.getElementById('study-step-content').innerHTML=renderStudyStep(null);bindStudyStep();
}

async function saveStudy(editId){

  if(cloudUser&&imagesToUpload.length){

// Sube las imágenes de un estudio al bucket por detrás, sin bloquear la interfaz
async function uploadStudyImages(studyId,images){
  const uploadedPaths=[];
  let huboSubida=false;
  for(let i=0;i<images.length;i++){
    const img=images[i];
    if(typeof img==='string'&&img.startsWith('http')){uploadedPaths.push(img);continue;}
    try{
      const blob=base64ToBlob(img);
      const path=`${cloudUser.id}/${studyId}_${i}_${Date.now()}.jpg`;
      const {error}=await sb.storage.from('imagenes').upload(path,blob,{contentType:'image/jpeg',upsert:true});
      if(error)throw error;
      uploadedPaths.push(path);huboSubida=true;
    }catch(e){console.log('Upload img bg:',e.message);}
  }
  if(huboSubida){
    // Actualizar el estudio con los paths de las imágenes en la nube
    const studies=db.studies();
    const st=studies.find(x=>x.id===studyId);
    if(st){
      st.imagePaths=uploadedPaths;
      // Generar URLs firmadas para poder mostrar las imágenes sin guardar base64
      st.images=[];
      for(const path of uploadedPaths){
        if(path.startsWith('http')){st.images.push(path);continue;}
        try{
          const {data:signed}=await sb.storage.from('imagenes').createSignedUrl(path,3600);
          if(signed?.signedUrl)st.images.push(signed.signedUrl);
        }catch(e){}
      }
      db.saveStudies(studies);
    }
    toast('Imágenes sincronizadas en la nube.','ok');
    // Si estoy viendo el historial, refrescar para mostrar las imágenes
    if(currentPage==='studies'&&selectedPatient)renderPage();
  }
}

          ${renderClock(s.clockMarks||[])}
          <div style="font-size:11px;color:var(--text3);text-align:center">${(s.clockMarks||[]).length===0?'Sin marcas':s.clockMarks.sort((a,b)=>a-b).map(h=>h+'hs').join(', ')}</div>
        </div>
      </div>
      ${s.diagnostico?`<div style="background:var(--surface);border-radius:10px;padding:14px;margin-bottom:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600">Diagnóstico (valoración del médico)</div>
        <div style="font-size:16px;font-family:Lora,serif;color:var(--text);margin-top:2px">${s.diagnostico}</div>
        ${s.conducta?`<div style="font-size:13px;color:var(--teal);margin-top:8px">Conducta: ${s.conducta}</div>`:''}
      </div>`:''}
      ${s.notas&&!s.aiSummary?`<div style="background:var(--bg3);border-radius:10px;padding:14px;margin-bottom:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px">Observaciones</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.7">${s.notas}</div>
      </div>`:''}
      ${s.images?.length?`<div><div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px">Imágenes</div>
        <div style="display:flex;flex-wrap:wrap;gap:10px">${s.images.map(img=>`<img src="${img}" style="width:120px;height:100px;object-fit:cover;border-radius:8px;border:1px solid var(--border)"/>`).join('')}</div>
      </div>`:''}
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
        <button class="btn btn-g" onclick="document.getElementById('study-view-modal').innerHTML=''">Cerrar</button>
        <button class="btn btn-t" onclick="generatePDF('${s.id}')">📄 Descargar PDF</button>
      </div>
    </div>
  </div></div>`;
}

// ═══════════════════════════════════════
// PDF GENERATOR
// ═══════════════════════════════════════
function generatePDF(studyId){
  const s=db.studies().find(x=>x.id===studyId);
  const p=selectedPatient||db.patients().find(x=>x.id===s?.patientId);
  if(!s||!p){toast('Error: datos no encontrados.','err');return;}
  toast('Generando PDF...','info');
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,M=20;let y=0;
    doc.setFillColor(12,16,24);doc.rect(0,0,W,40,'F');
    doc.setFillColor(0,212,184);doc.rect(0,0,4,40,'F');
    doc.setFillColor(79,142,247);doc.roundedRect(M,10,20,20,3,3,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(8);doc.setFont('helvetica','bold');
    doc.text('COLPO',M+10,19,{align:'center'});doc.text('AI',M+10,25,{align:'center'});
    doc.setFontSize(18);doc.setTextColor(221,228,240);doc.text('ColpoAI',M+25,18);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(80,94,122);
    doc.text('ColpoAId · Sistema de Colposcopía Inteligente',M+25,25);
    if(s.aiAnalyzed){doc.setTextColor(167,139,250);doc.setFontSize(8);doc.text('★ Analizado con Motor IA ColpoAId',M+25,31);}
    doc.text(new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}),W-M,25,{align:'right'});
    y=50;
    doc.setFillColor(26,34,50);doc.rect(M,y,W-M*2,12,'F');
    doc.setTextColor(0,212,184);doc.setFontSize(11);doc.setFont('helvetica','bold');
    doc.text('INFORME DE COLPOSCOPÍA',M+5,y+8);y+=18;
    doc.setTextColor(79,142,247);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('DATOS DE LA PACIENTE',M,y);
    doc.setDrawColor(79,142,247);doc.setLineWidth(.3);doc.line(M,y+2,W-M,y+2);y+=8;
    doc.autoTable({startY:y,head:[],body:[
      ['Nombre',`${p.nombre}${p.codigo?' · '+p.codigo:''}`],
      ['Edad',p.edad?`${p.edad} años`:'—'],['Fecha',s.date||'—'],
      ['PAP',p.pap||'Sin datos'],['HPV',p.hpv||'Sin datos'],
      ['Motivo',p.motivo||'—'],
    ],theme:'plain',styles:{fontSize:9,cellPadding:3,textColor:[221,228,240],fillColor:[12,16,24]},
    columnStyles:{0:{fontStyle:'bold',textColor:[80,94,122],cellWidth:50}},
    margin:{left:M,right:M},tableLineColor:[26,34,50],tableLineWidth:.1});
    y=doc.lastAutoTable.finalY+10;
    if(s.aiAnalyzed&&s.aiSummary){
      doc.setFillColor(30,20,50);doc.roundedRect(M,y,W-M*2,0.3,0,0,'F');
      doc.setFillColor(25,18,45);doc.roundedRect(M,y,W-M*2,28,2,2,'F');
      doc.setDrawColor(167,139,250);doc.setLineWidth(.3);doc.roundedRect(M,y,W-M*2,28,2,2,'S');
      doc.setTextColor(167,139,250);doc.setFontSize(8);doc.setFont('helvetica','bold');
      doc.text('★ DESCRIPCIÓN GENERADA POR MOTOR IA ColpoAId',M+5,y+7);
      doc.setFont('helvetica','italic');doc.setFontSize(9);doc.setTextColor(180,180,210);
      const aiLines=doc.splitTextToSize(s.aiSummary,W-M*2-10);doc.text(aiLines,M+5,y+14);
      y+=32;
    }
    doc.setTextColor(79,142,247);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('HALLAZGOS COLPOSCÓPICOS',M,y);
    doc.setDrawColor(79,142,247);doc.line(M,y+2,W-M,y+2);y+=8;
    const f=s.findings||{};
    doc.autoTable({startY:y,head:[],body:[
      ['Unión escamocolumnar',f.union||'—'],['Acetoblanco',f.acetoblanco||'Ausente'],
      ['Mosaico',f.mosaico||'Ausente'],['Punteado',f.punteado?'Presente':'Ausente'],
      ['Vasos atípicos',f.vasos?'Presentes':'Ausentes'],['Yodo',f.yodo||'—'],
      ['Cervicitis',f.cervicitis?'Presente':'Ausente'],['Leucoplasia',f.leucoplasia?'Presente':'Ausente'],
    ],theme:'plain',styles:{fontSize:9,cellPadding:3,textColor:[221,228,240],fillColor:[12,16,24]},
    columnStyles:{0:{fontStyle:'bold',textColor:[80,94,122],cellWidth:60}},
    margin:{left:M,right:M},tableLineColor:[26,34,50],tableLineWidth:.1});
    y=doc.lastAutoTable.finalY+10;
    if(s.clockMarks?.length>0){
      doc.setTextColor(79,142,247);doc.setFontSize(10);doc.setFont('helvetica','bold');
      doc.text('RELOJ CERVICAL',M,y);doc.setDrawColor(79,142,247);doc.line(M,y+2,W-M,y+2);y+=8;
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(80,94,122);
      doc.text(`Posiciones marcadas: ${s.clockMarks.sort((a,b)=>a-b).map(h=>h+'hs').join(', ')}`,M,y);y+=10;
    }
    if(y>220){doc.addPage();y=20;}
    doc.setTextColor(79,142,247);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text('IMPRESIÓN DIAGNÓSTICA',M,y);
    doc.setDrawColor(0,212,184);doc.setLineWidth(.5);doc.line(M,y+2,W-M,y+2);y+=8;
    doc.setFillColor(26,34,50);doc.roundedRect(M,y,W-M*2,20,2,2,'F');
    doc.setDrawColor(0,212,184);doc.setLineWidth(.2);doc.roundedRect(M,y,W-M*2,20,2,2,'S');
    doc.setTextColor(221,228,240);doc.setFontSize(11);doc.setFont('helvetica','bold');
    doc.text(s.diagnostico||'Sin diagnóstico',M+5,y+13);
    if(s.conducta){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(0,212,184);doc.text('Conducta: '+s.conducta,M+5,y+19);}
    y+=28;
    if(s.biopsias?.length){
      if(y>220){doc.addPage();y=20;}
      doc.setTextColor(79,142,247);doc.setFontSize(10);doc.setFont('helvetica','bold');
      doc.text('BIOPSIAS Y ANATOMÍA PATOLÓGICA',M,y);
      doc.setDrawColor(79,142,247);doc.setLineWidth(.3);doc.line(M,y+2,W-M,y+2);y+=8;
      doc.autoTable({startY:y,
        head:[['Bx','Hora','Zona','Fecha Bx','Resultado AP','Fecha AP']],
        body:s.biopsias.map((b,i)=>[`Bx${i+1}`,b.hora?`${b.hora}hs`:'—',b.zona||'—',b.fechaBiopsia||'—',b.resultado||'Pendiente',b.fechaResultado||'—']),
        theme:'plain',
        headStyles:{fontSize:8,fontStyle:'bold',textColor:[80,94,122],fillColor:[26,34,50]},
        styles:{fontSize:9,cellPadding:3,textColor:[221,228,240],fillColor:[12,16,24]},
        margin:{left:M,right:M},tableLineColor:[26,34,50],tableLineWidth:.1});
      y=doc.lastAutoTable.finalY+6;
      if(s.correlacion){
        const corColor=s.correlacion.includes('Concordante')?[34,201,122]:[245,166,35];
        doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(...corColor);
        doc.text(`Correlación colposcopía/histología: ${s.correlacion}`,M,y);y+=10;
      }
    }
    if(s.notas){
      if(y>230){doc.addPage();y=20;}
      doc.setTextColor(79,142,247);doc.setFontSize(10);doc.setFont('helvetica','bold');
      doc.text('OBSERVACIONES',M,y);doc.setDrawColor(79,142,247);doc.setLineWidth(.3);doc.line(M,y+2,W-M,y+2);y+=8;
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(221,228,240);
      const lines=doc.splitTextToSize(s.notas,W-M*2);doc.text(lines,M,y);y+=lines.length*5+8;
    }
    if(s.images?.length){
      if(y>220){doc.addPage();y=20;}
      doc.setTextColor(79,142,247);doc.setFontSize(10);doc.setFont('helvetica','bold');
      doc.text('IMÁGENES',M,y);doc.setDrawColor(79,142,247);doc.line(M,y+2,W-M,y+2);y+=8;
      let ix=M;const iw=50,ih=40,gap=5;
      for(let i=0;i<Math.min(s.images.length,6);i++){
        if(ix+iw>W-M){ix=M;y+=ih+gap+5;}
        if(y+ih>280){doc.addPage();y=20;}
        try{doc.addImage(s.images[i],'JPEG',ix,y,iw,ih);doc.setDrawColor(80,94,122);doc.setLineWidth(.2);doc.rect(ix,y,iw,ih);}catch(e){}
        ix+=iw+gap;
      }y+=ih+12;
    }
    if(y>250){doc.addPage();y=20;}
    doc.setFillColor(26,34,50);doc.rect(M,y,W-M*2,.3,'F');y+=8;
    // Datos del profesional (perfil)
    const prof=db.doctor()||{};
    // Firma caligráfica si existe
    if(prof.firma){
      try{doc.addImage(prof.firma,'PNG',M,y,45,16);}catch(e){}
    }
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(80,94,122);
    doc.text('Firma y sello profesional:',M+55,y+10);
    doc.setDrawColor(80,94,122);doc.setLineWidth(.2);doc.line(M+110,y+10,W-M,y+10);y+=22;
    if(prof.name||prof.matricula){
      doc.setTextColor(40,50,70);doc.setFont('helvetica','bold');doc.setFontSize(10);
      if(prof.name){doc.text(prof.name,M,y);y+=5;}
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(80,94,122);
      const linea=[prof.especialidad,prof.matricula].filter(Boolean).join(' · ');
      if(linea){doc.text(linea,M,y);y+=5;}
      if(prof.institucion){doc.text(prof.institucion,M,y);y+=5;}
    }
    y+=6;
    doc.setFontSize(8);doc.setTextColor(80,94,122);
    doc.text('Generado por ColpoAId · MedicAId · Análisis de apoyo — decisión clínica a cargo del médico tratante',W/2,y,{align:'center'});
    doc.save(`ColpoAI_${p.nombre?.replace(/\s+/g,'_')||'paciente'}_${s.date||'sin-fecha'}.pdf`);
    toast('PDF descargado.','ok');
  }catch(e){console.error(e);toast('Error al generar PDF.','err');}
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.onload=async()=>{
  // Verificar si hay sesión activa en la nube
  try{
    const {data}=await sb.auth.getSession();
    if(data.session){
      cloudUser=data.session.user;
      const name=cloudUser.user_metadata?.name||cloudUser.email.split('@')[0];
      currentDoctor={name,email:cloudUser.email};
      db.saveDoctor(currentDoctor);
      await db.loadFromCloud();
      subscribeRealtime();
    }
  }catch(e){console.log('No session');}
  render();
};

// ── Sincronización en tiempo real ──
// Escucha cambios en la nube y actualiza la pantalla sola
let realtimeChannel=null;
let realtimeTimer=null;
function subscribeRealtime(){
  if(!cloudUser||realtimeChannel)return;
  realtimeChannel=sb.channel('cambios-colpoaid')
    .on('postgres_changes',{event:'*',schema:'public',table:'pacientes',filter:`user_id=eq.${cloudUser.id}`},onRealtimeChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'estudios',filter:`user_id=eq.${cloudUser.id}`},onRealtimeChange)
    .subscribe();
}
function onRealtimeChange(){
  // Esperar un momento y recargar (evita recargas múltiples seguidas)
  clearTimeout(realtimeTimer);
  realtimeTimer=setTimeout(async()=>{
    // No interrumpir si hay un modal abierto (editando)
    const modalAbierto=document.querySelector('.modal-bg');
    if(modalAbierto)return;
    await db.loadFromCloud();
    // Si estoy viendo el detalle de una paciente, refrescar la referencia
    if(selectedPatient){
      const fresh=db.patients().find(p=>p.id===selectedPatient.id);
      if(fresh)selectedPatient=fresh;
    }
    // Re-renderizar la vista actual completa para reflejar imágenes nuevas
    renderPage();
  },1200);
}
</script>
